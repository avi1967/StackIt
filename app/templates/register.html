<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - StackIt</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/static/css/style.css" rel="stylesheet" />
</head>
<body>
  <script>
    (function() {
      const theme = localStorage.getItem('theme') || 'light';
      if (theme === 'dark') {
        document.body.classList.add('dark-theme');
      }
    })();
  </script>

  <div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
    <div class="auth-container w-100">
      <div class="text-center mb-4">
        <a href="/" class="brand-logo justify-content-center">🪶 StackIt</a>
      </div>
      <h4 class="auth-title">Create Your Account</h4>
      
      <form method="POST" action="{{ url_for('main.register') }}">
        <!-- FLASH MESSAGES -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-warning alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="mb-3">
          <label for="signupEmail" class="form-label fw-medium">Email Address</label>
          <input type="email" id="signupEmail" name="username" class="form-control" placeholder="name@example.com" required />
        </div>

        <div class="mb-4">
          <label for="signupPassword" class="form-label fw-medium">Password</label>
          <input type="password" id="signupPassword" name="password" class="form-control" placeholder="••••••••" required />
        </div>

        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-primary-custom py-2">Sign Up</button>
        </div>

        <div class="text-center">
          <span class="text-secondary small">
            Already have an account? <a href="{{ url_for('main.login') }}" class="text-primary fw-medium">Login</a>
          </span>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
