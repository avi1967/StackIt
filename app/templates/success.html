<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Success - StackIt</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/static/css/style.css" rel="stylesheet" />
</head>
<body>
  <script>
    (function() {
      const theme = localStorage.getItem('theme') || 'light';
      if (theme === 'dark') {
        document.body.classList.add('dark-theme');
      }
    })();
  </script>

  <div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
    <div class="detail-box text-center p-5 shadow-lg" style="max-width: 500px;">
      <h1 class="text-success mb-3 animate-pulse-hover" style="font-size: 3.5rem;">🎉</h1>
      <h3 class="fw-bold mb-3">Question Submitted!</h3>
      <p class="text-secondary lead mb-4">Your question has been posted successfully and is now live on the forum.</p>
      <a href="{{ url_for('main.home') }}" class="btn btn-primary-custom py-2 px-4">Go to Home</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
